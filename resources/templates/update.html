<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phi-Plugin Update</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            padding: 20px;
            min-width: 500px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        
        .header h1 {
            font-size: 28px;
            color: #4caf50;
            margin-bottom: 10px;
        }
        
        .success-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .player-info {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        
        .info-item {
            text-align: center;
        }
        
        .info-item .label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 5px;
        }
        
        .info-item .value {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
        }
        
        .rks {
            color: #e94560;
            font-size: 24px !important;
        }
        
        .challenge-mode {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .challenge-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }
        
        .color-0 { background: #fff; }
        .color-1 { background: #4caf50; }
        .color-2 { background: #2196f3; }
        .color-3 { background: #f44336; }
        .color-4 { background: #ffd700; }
        .color-5 { background: #e91e63; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            backdrop-filter: blur(5px);
        }
        
        .stat-label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            padding: 15px;
            color: #666;
            font-size: 12px;
        }
        
        .message {
            background: rgba(76, 175, 80, 0.2);
            border-left: 3px solid #4caf50;
            padding: 10px 15px;
            margin-top: 20px;
            border-radius: 0 5px 5px 0;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="success-icon">✅</div>
            <h1>存档更新成功</h1>
            <div class="player-info">
                <div class="info-item">
                    <div class="label">玩家ID</div>
                    <div class="value">{{ player_id }}</div>
                </div>
                <div class="info-item">
                    <div class="label">RKS</div>
                    <div class="value rks">{{ "%.4f"|format(rks) }}</div>
                </div>
                <div class="info-item">
                    <div class="label">Challenge Mode</div>
                    <div class="value challenge-mode">
                        <div class="challenge-color color-{{ challenge_color }}"></div>
                        <span>{{ challenge_rank }}</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">游戏记录数</div>
                <div class="stat-value">{{ total_records }}</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">数据</div>
                <div class="stat-value">{{ money }}</div>
            </div>
        </div>
        
        <div class="message">
            <p>可以使用 /phi b30 查询B30成绩</p>
        </div>
        
        <div class="footer">
            <p>Generated by Phi-Plugin for AstrBot</p>
        </div>
    </div>
</body>
</html>
