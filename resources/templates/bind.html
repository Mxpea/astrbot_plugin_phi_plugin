<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phi-Plugin Bind</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=JetBrains+Mono:wght@400;500&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #7C3AED;
            --secondary: #A78BFA;
            --accent: #F43F5E;
            --background: #0F0F23;
            --card: #1E1C35;
            --muted: #27273B;
            --border: #4C1D95;
            --foreground: #E2E8F0;
            --success: #22C55E;
        }
        
        body {
            font-family: 'JetBrains Mono', 'Microsoft YaHei', monospace;
            background: var(--background);
            color: var(--foreground);
            padding: 24px;
            width: 500px;
        }
        
        .container {
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 24px;
            padding: 24px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
        }
        
        .success-icon {
            font-size: 36px;
            margin-bottom: 12px;
            color: var(--success);
            text-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
        }
        
        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 900;
            color: var(--success);
            margin-bottom: 16px;
        }
        
        .player-info {
            margin-top: 16px;
        }
        
        .info-item {
            text-align: center;
            margin-bottom: 12px;
        }
        
        .info-item .label {
            font-size: 10px;
            color: var(--secondary);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .info-item .value {
            font-size: 16px;
            font-weight: 500;
            color: var(--foreground);
        }
        
        .rks {
            color: var(--accent);
            font-size: 20px;
            font-weight: 700;
            text-shadow: 0 0 8px rgba(244, 63, 94, 0.5);
        }
        
        .message {
            background: rgba(34, 197, 94, 0.1);
            border-left: 3px solid var(--success);
            padding: 12px;
            border-radius: 0 4px 4px 0;
            font-size: 12px;
            color: var(--success);
            text-align: center;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            padding: 12px;
            color: var(--muted);
            font-size: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="success-icon">✓</div>
            <h1>BIND SUCCESS</h1>
            <div class="player-info">
                <div class="info-item">
                    <div class="label">Player ID</div>
                    <div class="value">{{ player_id }}</div>
                </div>
                <div class="info-item">
                    <div class="label">RKS</div>
                    <div class="value rks">{{ "%.2f"|format(rks) }}</div>
                </div>
            </div>
        </div>
        
        <div class="message">
            Use /phi update to sync your save data
        </div>
        
        <div class="footer">
            Phi-Plugin for AstrBot
        </div>
    </div>
</body>
</html>
