<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phi-Plugin Bind</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            padding: 20px;
            min-width: 400px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        
        .header h1 {
            font-size: 28px;
            color: #4caf50;
            margin-bottom: 10px;
        }
        
        .success-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .player-info {
            margin-top: 20px;
        }
        
        .info-item {
            text-align: center;
            margin-bottom: 15px;
        }
        
        .info-item .label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 5px;
        }
        
        .info-item .value {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
        }
        
        .rks {
            color: #e94560;
            font-size: 24px !important;
        }
        
        .message {
            background: rgba(76, 175, 80, 0.2);
            border-left: 3px solid #4caf50;
            padding: 10px 15px;
            margin-top: 20px;
            border-radius: 0 5px 5px 0;
            font-size: 14px;
            text-align: center;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            padding: 15px;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="success-icon">✅</div>
            <h1>绑定成功</h1>
            <div class="player-info">
                <div class="info-item">
                    <div class="label">玩家ID</div>
                    <div class="value">{{ player_id }}</div>
                </div>
                <div class="info-item">
                    <div class="label">RKS</div>
                    <div class="value rks">{{ "%.2f"|format(rks) }}</div>
                </div>
            </div>
        </div>
        
        <div class="message">
            <p>请使用 /phi update 更新存档以获取完整数据</p>
        </div>
        
        <div class="footer">
            <p>Generated by Phi-Plugin for AstrBot</p>
        </div>
    </div>
</body>
</html>
