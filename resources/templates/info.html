<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phi-Plugin Info</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=JetBrains+Mono:wght@400;500&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #7C3AED;
            --secondary: #A78BFA;
            --accent: #F43F5E;
            --background: #0F0F23;
            --card: #1E1C35;
            --muted: #27273B;
            --border: #4C1D95;
            --foreground: #E2E8F0;
        }
        
        body {
            font-family: 'JetBrains Mono', 'Microsoft YaHei', monospace;
            background: var(--background);
            color: var(--foreground);
            padding: 24px;
            width: 600px;
        }
        
        .container {
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 24px;
            padding: 24px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
        }
        
        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(124, 58, 237, 0.5);
        }
        
        .player-info {
            display: flex;
            justify-content: center;
            gap: 32px;
        }
        
        .info-item {
            text-align: center;
        }
        
        .info-item .label {
            font-size: 10px;
            color: var(--secondary);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .info-item .value {
            font-size: 16px;
            font-weight: 500;
            color: var(--foreground);
        }
        
        .rks {
            color: var(--accent);
            font-size: 20px;
            font-weight: 700;
            text-shadow: 0 0 8px rgba(244, 63, 94, 0.5);
        }
        
        .challenge-mode {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .challenge-color {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            box-shadow: 0 0 6px currentColor;
        }
        
        .color-0 { background: #fff; color: #fff; }
        .color-1 { background: #22c55e; color: #22c55e; }
        .color-2 { background: #3b82f6; color: #3b82f6; }
        .color-3 { background: #ef4444; color: #ef4444; }
        .color-4 { background: #eab308; color: #eab308; }
        .color-5 { background: #ec4899; color: #ec4899; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            text-align: center;
        }
        
        .stat-label {
            font-size: 10px;
            color: var(--secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--foreground);
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            padding: 12px;
            color: var(--muted);
            font-size: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PLAYER INFO</h1>
            <div class="player-info">
                <div class="info-item">
                    <div class="label">Player ID</div>
                    <div class="value">{{ player_id }}</div>
                </div>
                <div class="info-item">
                    <div class="label">RKS</div>
                    <div class="value rks">{{ "%.4f"|format(rks) }}</div>
                </div>
                <div class="info-item">
                    <div class="label">Challenge</div>
                    <div class="value challenge-mode">
                        <div class="challenge-color color-{{ challenge_color }}"></div>
                        <span>{{ challenge_rank }}</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Records</div>
                <div class="stat-value">{{ total_records }}</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Data</div>
                <div class="stat-value">{{ money }}</div>
            </div>
        </div>
        
        <div class="footer">
            Phi-Plugin for AstrBot
        </div>
    </div>
</body>
</html>
